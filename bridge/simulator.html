<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeWear Technologies</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .sensor-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9em; color: #7f8c8d; margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .val { font-weight: bold; color: #3498db; float: right; }
        #status { padding: 10px 20px; border-radius: 20px; margin-bottom: 20px; font-weight: bold; color: white; background: #e74c3c; }
        .mqtt-info { font-size: 0.8em; color: #bdc3c7; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>SafeWear EPI Simulation</h1>
    <div id="status">MQTT Disconnected</div>

    <div class="container">
        <div class="sensor-card">
            <h2>Upper Back</h2>
            <div id="upperBack-controls"></div>
        </div>

        <div class="sensor-card">
            <h2>Lower Back</h2>
            <div id="lowerBack-controls"></div>
        </div>
    </div>

    <div class="mqtt-info">Sending to topic : <b>safewear/gilet_01/capteurs</b></div>

    <script>
        // Configuration
        const BROKER = 'wss://test.mosquitto.org:8081/mqtt';
        const TOPIC = 'safewear/gilet_01/capteurs';
        const client = mqtt.connect(BROKER);

        const sensors = {
            upperBack: { ax: 0, ay: 0, az: 1, gx: 0, gy: 0, gz: 0 },
            lowerBack: { ax: 0, ay: 0, az: 1, gx: 0, gy: 0, gz: 0 }
        };

        const config = [
            { id: 'ax', label: 'Acc X (g)', min: -2, max: 2, step: 0.01 },
            { id: 'ay', label: 'Acc Y (g)', min: -2, max: 2, step: 0.01 },
            { id: 'az', label: 'Acc Z (g)', min: -2, max: 2, step: 0.01 },
            { id: 'gx', label: 'Rot X (°/s)', min: -250, max: 250, step: 1 },
            { id: 'gy', label: 'Rot Y (°/s)', min: -250, max: 250, step: 1 },
            { id: 'gz', label: 'Rot Z (°/s)', min: -250, max: 250, step: 1 }
        ];

        // Génération dynamique de l'interface
        ['upperBack', 'lowerBack'].forEach(sensorId => {
            const container = document.getElementById(`${sensorId}-controls`);
            config.forEach(c => {
                const div = document.createElement('div');
                div.className = 'control-group';
                div.innerHTML = `
                    <label>${c.label} <span class="val" id="${sensorId}-${c.id}-val">${sensors[sensorId][c.id]}</span></label>
                    <input type="range" min="${c.min}" max="${c.max}" step="${c.step}" value="${sensors[sensorId][c.id]}" 
                        oninput="updateValue('${sensorId}', '${c.id}', this.value)">
                `;
                container.appendChild(div);
            });
        });

        function updateValue(sensor, axis, val) {
            sensors[sensor][axis] = parseFloat(val);
            document.getElementById(`${sensor}-${axis}-val`).innerText = val;
        }

        // MQTT Connection
        client.on('connect', () => {
            document.getElementById('status').innerText = "MQTT Connected";
            document.getElementById('status').style.background = "#2ecc71";
            
            // Boucle d'envoi (2 messages par seconde)
            setInterval(() => {
                const payload = {
                    timestamp: Date.now(),
                    ...sensors
                };
                client.publish(TOPIC, JSON.stringify(payload));
            }, 500);
        });

        client.on('error', (err) => {
            console.error(err);
            document.getElementById('status').innerText = "- Error connecting to MQTT broker";
        });
    </script>
</body>
</html>
